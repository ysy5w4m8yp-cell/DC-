<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dla Ciebie ❤️</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#ffd6e7,#ffeef5);
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

/* Serduszka */
.heart-bg{
  position:absolute;
  color:#ff4d88;
  animation:float 8s linear infinite;
  opacity:0.3;
}

@keyframes float{
  from{
    transform:translateY(100vh) scale(0.5);
  }
  to{
    transform:translateY(-120px) scale(1.2);
  }
}

.box{
  background:white;
  width:90%;
  max-width:420px;
  padding:35px;
  border-radius:25px;
  box-shadow:0 0 25px rgba(0,0,0,0.15);
  text-align:center;
  animation:fadeIn .5s;
  z-index:2;
}

h2{
  color:#ff2e74;
  margin-bottom:25px;
}

button{
  display:block;
  width:85%;
  margin:12px auto;
  padding:14px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  background:#ff4d88;
  color:white;
  font-size:16px;
  transition:.2s;
}

button:hover{
  background:#ff1f68;
  transform:scale(1.05);
}

p{
  color:#555;
  font-size:18px;
  line-height:1.5;
}

.heart{
  font-size:60px;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.15);}
  100%{transform:scale(1);}
}

@keyframes fadeIn{
  from{
    opacity:0;
    transform:translateY(15px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}
</style>
</head>

<body>

<div class="box">
  <h2 id="question">Gotowa na kilka bardzo ważnych pytań? ❤️</h2>

  <div id="answers">
    <button onclick="question2()">Tak 😍</button>
    <button onclick="question2()">Zawsze 😎</button>
  </div>
</div>

<script>

function setQuestion(text, buttons){
  document.getElementById("question").innerHTML = text;
  document.getElementById("answers").innerHTML = buttons;
}

function question2(){
  setQuestion(
    "Co najbardziej mnie w Tobie pociąga?",
    `
    <button onclick="question3()">Twój uśmiech 😍</button>
    <button onclick="question3()">To jak na mnie patrzysz 👀</button>
    <button onclick="question3()">Twoje pośladki 🍑</button>
    <button onclick="question3()">Absolutnie wszystko ❤️</button>
    `
  );
}

function question3(){
  setQuestion(
    "Jak się czuję kiedy nie ma Cię obok mnie?",
    `
    <button onclick="question4()">Źle 😭</button>
    <button onclick="question4()">Bardzo źle 💔</button>
    <button onclick="question4()">Jak pies bez właściciela 🐶</button>
    <button onclick="question4()">Tragicznie 🥲</button>
    `
  );
}

function question4(){
  setQuestion(
    "Ile razy dziennie o Tobie myślę?",
    `
    <button onclick="question5()">Cały czas 😵‍💫</button>
    <button onclick="question5()">Więcej niż powinienem ❤️</button>
    <button onclick="question5()">Non stop 😎</button>
    `
  );
}

function question5(){
  setQuestion(
    "Najważniejsze pytanie...",
    `
    <button onclick="finalMessage()">
      Czy jesteś najlepszą dziewczyną na świecie? 😍
    </button>
    `
  );
}

function finalMessage(){
  document.querySelector(".box").innerHTML = `
    <div class="heart">❤️</div>
    <h2>Kocham Cię bardziej niż umiem opisać</h2>
    <p>
      Dziękuję, że jesteś ❤️<br><br>
      Każdy dzień z Tobą jest moim ulubionym.
    </p>
  `;
}

/* Animowane serduszka */
function createHeart(){
  const heart = document.createElement("div");
  heart.classList.add("heart-bg");
  heart.innerHTML = "❤";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 25 + 15) + "px";
  heart.style.animationDuration = (Math.random() * 5 + 5) + "s";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 9000);
}

setInterval(createHeart, 300);

</script>

</body>
</html>
